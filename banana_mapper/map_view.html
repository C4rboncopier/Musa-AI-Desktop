<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Musa AI GIS View</title>
  <link rel="stylesheet" href="vendor/leaflet/leaflet.css">
  <style>
    :root {
      --map-bg: #0a0f1a;
      --ctrl-bg: #131e33;
      --ctrl-fg: #c8d6e5;
      --attr-bg: rgba(14,21,37,0.85);
      --attr-fg: #94a3b8;
      --tooltip-bg: rgba(14,21,37,0.92);
      --tooltip-border: rgba(59,130,246,0.45);
      --tooltip-fg: #dbeafe;
      --extent-color: #3b82f6;
    }
    * { box-sizing: border-box; }
    html, body, #map {
      height: 100%;
      margin: 0;
      width: 100%;
      background: var(--map-bg);
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
    }
    .leaflet-container { background: var(--map-bg); color: var(--ctrl-fg); }
    .leaflet-control-attribution {
      background: var(--attr-bg) !important;
      color: var(--attr-fg) !important;
      font-size: 10px;
      border-radius: 4px 0 0 0;
      padding: 3px 8px;
    }
    .leaflet-control-attribution a { color: var(--attr-fg) !important; }
    .leaflet-control-scale-line {
      background: var(--attr-bg);
      border-color: var(--attr-fg);
      color: var(--attr-fg);
      font-size: 10px;
      border-radius: 2px;
    }
    .leaflet-bar {
      border: none !important;
      box-shadow: 0 2px 12px rgba(0,0,0,0.25);
      border-radius: 6px;
      overflow: hidden;
    }
    .leaflet-bar a, .leaflet-bar a:hover {
      background: var(--ctrl-bg);
      color: var(--ctrl-fg);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      width: 32px;
      height: 32px;
      line-height: 32px;
      font-size: 16px;
    }
    .leaflet-bar a:hover { filter: brightness(1.18); }
    .map-error {
      align-items: center;
      color: #fecaca;
      display: flex;
      font-size: 15px;
      height: 100%;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .overlay-label {
      background: var(--tooltip-bg);
      border: 1px solid var(--tooltip-border);
      border-radius: 6px;
      color: var(--tooltip-fg);
      font-size: 11px;
      font-weight: 700;
      padding: 5px 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.28);
    }
    .layer-legend {
      position: absolute;
      bottom: 26px;
      right: 10px;
      z-index: 900;
      background: var(--attr-bg);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 7px;
      padding: 9px 11px;
      min-width: 180px;
      display: none;
    }
    .layer-legend.shown { display: block; }
    .legend-title {
      color: var(--ctrl-fg);
      font-size: 10px;
      font-weight: 800;
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .legend-row {
      align-items: center;
      color: var(--attr-fg);
      display: flex;
      font-size: 10px;
      gap: 7px;
      line-height: 1.6;
    }
    .swatch {
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 2px;
      display: inline-block;
      height: 10px;
      width: 16px;
    }
    .geotiff-fallback-overlay,
    .geotiff-image-overlay,
    .geotiff-image-tile {
      backface-visibility: hidden;
      image-rendering: auto;
      pointer-events: none;
      transform: translateZ(0);
      will-change: transform, opacity;
    }
    .geotiff-image-tile {
      opacity: 0;
      transition: opacity 140ms linear;
    }
    .geotiff-image-tile.loaded {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="layerLegend" class="layer-legend">
    <div class="legend-title">AI Point Layers</div>
    <div class="legend-row"><span class="swatch" style="background:#fb923c"></span> Cut leaf</div>
    <div class="legend-row"><span class="swatch" style="background:#c084fc"></span> Black sigatoka</div>
    <div class="legend-row"><span class="swatch" style="background:#f87171"></span> Panama</div>
  </div>

  <script src="vendor/leaflet/leaflet.js"></script>
  <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
  <script>
  var bridge = null, map = null;
  var baseTileLayer = null;
  var activeBaseMap = "osm";
  var BASE_MAPS = {
    osm: {
      url: "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
      options: {
        maxZoom: 25,
        maxNativeZoom: 19,
        detectRetina: false,
        updateWhenIdle: true,
        updateWhenZooming: false,
        errorTileUrl: transparentTile(),
        crossOrigin: false,
        retryOnTileError: false,
        subdomains: "abc",
        attribution: "&copy; OpenStreetMap contributors"
      }
    },
    google_satellite: {
      googleMapType: "satellite",
      attribution: "Imagery &copy; Google"
    }
  };
  var googleMapsApiKey = "";
  var imageOverlay = null, extentRectangle = null, labelTooltip = null;
  var currentBounds = null, pendingOverlay = null, pendingDetections = null;
  var overlayVisible = true, overlayOpacity = 0.78;
  var detectionOpacity = 1.0;
  var mapReady = false;
  var currentExtentColor = "#3b82f6";
  var detectionGroup = null;
  var pointRenderer = null;
  var detectionLayers = [];
  var detectionLayerById = {};
  var allRecords = [];
  var detectionRenderTimer = null;
  var MAX_VISIBLE_POINTS = 9000;
  var pendingMouseLatLng = null;
  var coordFrame = null;
  var lastBridgeCoordAt = 0;
  var scanBoxLayer = null;
  var mapRefreshTimer = null;
  var mapRefreshUntil = 0;
  var overlayFitTimers = [];
  var detectionVisibility = {
    full_leaf: false, cut_leaf: true,
    black_sigatoka: true, panama: true,
    healthy_leaf: false, diseased_leaf: false
  };
    var detectionStyles = { show_dots: true, show_bboxes: true, show_polygons: false, show_tile_heatmap: false };

  var CLASS_STYLES = {
    full_leaf:      { color: "#0891b2", fill: "#22d3ee", radius: 7, weight: 2, dash: null },
    cut_leaf:       { color: "#c2410c", fill: "#fb923c", radius: 7, weight: 2, dash: null },
    black_sigatoka: { color: "#7c3aed", fill: "#c084fc", radius: 8, weight: 2, dash: "5 4" },
    panama:         { color: "#dc2626", fill: "#f87171", radius: 8, weight: 2, dash: "5 4" },
    healthy_leaf:   { color: "#16a34a", fill: "#4ade80", radius: 7, weight: 2, dash: null },
    diseased_leaf:  { color: "#ca8a04", fill: "#facc15", radius: 8, weight: 2, dash: null }
  };
  function initializeMap() {
    if (typeof L === "undefined") {
      document.getElementById("map").innerHTML = '<div class="map-error">Leaflet could not be loaded.</div>';
      return;
    }
    map = L.map("map", {
      zoomControl: false,
      preferCanvas: true,
      worldCopyJump: false,
      zoomAnimation: true,
      fadeAnimation: true,
      maxZoom: 25
    }).setView([11.0, 122.0], 6);

    createMapPanes();
    baseTileLayer = createBaseTileLayer(activeBaseMap).addTo(map);
    L.control.scale({ imperial: false, position: "bottomleft" }).addTo(map);
    preventAttributionNavigation();
    pointRenderer = L.canvas({ padding: 0.35 });
    detectionGroup = L.layerGroup().addTo(map);
    heatmapGroup = L.layerGroup().addTo(map);
    heatmapTiles = {};

    map.on("mousemove", function(e) {
      pendingMouseLatLng = e.latlng;
      if (!coordFrame) coordFrame = L.Util.requestAnimFrame(flushMousePosition);
    });
    map.on("click", handleDetectionClick);
    map.on("zoomend", function() {
      if (bridge) bridge.reportZoom(map.getZoom());
      refreshBaseLayerAfterZoom();
      scheduleDetectionRender();
    });
    map.on("resize viewreset", function() { scheduleMapRefresh(250); });
    map.on("moveend resize", function() { scheduleDetectionRender(false); });

    if (typeof qt !== "undefined" && qt.webChannelTransport) {
      new QWebChannel(qt.webChannelTransport, function(ch) {
        bridge = ch.objects.mapBridge;
        bridge.reportZoom(map.getZoom());
        bridge.reportMapReady();
        if (pendingOverlay) {
          var p = pendingOverlay;
          pendingOverlay = null;
          setOverlay(p);
        }
        if (pendingDetections) {
          var q = pendingDetections;
          pendingDetections = null;
          setDetectionData(q);
        }
      });
    }
    mapReady = true;
    scheduleMapRefresh(2500);
  }

  function createBaseTileLayer(name) {
    var spec = BASE_MAPS[name] || BASE_MAPS.osm;
    if (spec.googleMapType) {
      return createGoogleTileLayer(spec.googleMapType, spec.attribution);
    }
    var options = Object.assign({
      keepBuffer: 6,
      updateWhenIdle: false,
      updateWhenZooming: true,
      updateInterval: 120,
      detectRetina: true,
      crossOrigin: false
    }, spec.options || {});
    var layer = L.tileLayer(spec.url, options);
    if (options.retryOnTileError !== false) layer.on("tileerror", function(e) {
      var tile = e.tile;
      if (!tile || tile._musaRetryCount >= 2) return;
      tile._musaRetryCount = (tile._musaRetryCount || 0) + 1;
      setTimeout(function() {
        if (tile && tile.src) tile.src = tile.src.split("?")[0] + "?retry=" + Date.now();
      }, 250 * tile._musaRetryCount);
    });
    return layer;
  }

  function refreshBaseLayerAfterZoom() {
    if (!map || !baseTileLayer || activeBaseMap !== "osm") return;
    var nativeMaxZoom = BASE_MAPS.osm.options.maxNativeZoom || 19;
    if (map.getZoom() <= nativeMaxZoom) return;
    scheduleMapRefresh(600);
  }

  function preventAttributionNavigation() {
    document.addEventListener("click", function(event) {
      var link = event.target && event.target.closest
        ? event.target.closest(".leaflet-control-attribution a")
        : null;
      if (!link) return;
      event.preventDefault();
      event.stopPropagation();
    }, true);
  }

  function createGoogleTileLayer(mapType, attribution) {
    var layer = L.tileLayer("", {
      maxZoom: 22,
      maxNativeZoom: 22,
      tileSize: 256,
      keepBuffer: 6,
      updateWhenIdle: false,
      updateWhenZooming: true,
      updateInterval: 120,
      crossOrigin: true,
      attribution: attribution
    });
    layer._googleMapType = mapType;
    layer._googleSession = null;
    layer._googleSessionLoading = false;
    layer._googleSessionFailed = false;
    layer.getTileUrl = function(coords) {
      if (!googleMapsApiKey) return transparentTile();
      if (!this._googleSession) {
        this._ensureGoogleSession();
        return transparentTile();
      }
      return (
        "https://tile.googleapis.com/v1/2dtiles/" +
        coords.z + "/" + coords.x + "/" + coords.y +
        "?session=" + encodeURIComponent(this._googleSession) +
        "&key=" + encodeURIComponent(googleMapsApiKey)
      );
    };
    layer._ensureGoogleSession = function() {
      if (this._googleSession || this._googleSessionLoading || this._googleSessionFailed) return;
      this._googleSessionLoading = true;
      fetch("https://tile.googleapis.com/v1/createSession?key=" + encodeURIComponent(googleMapsApiKey), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          mapType: this._googleMapType,
          language: "en-US",
          region: "PH"
        })
      })
      .then(function(response) {
        if (!response.ok) throw new Error("Google Maps session failed: " + response.status);
        return response.json();
      })
      .then(function(data) {
        this._googleSession = data.session || "";
        this._googleSessionLoading = false;
        if (this._googleSession) {
          this.redraw();
          scheduleMapRefresh(1800);
        } else {
          this._googleSessionFailed = true;
        }
      }.bind(this))
      .catch(function(error) {
        this._googleSessionLoading = false;
        this._googleSessionFailed = true;
        console.warn(error);
      }.bind(this));
    };
    layer.on("add", function() { layer._ensureGoogleSession(); });
    return layer;
  }

  function transparentTile() {
    return "data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==";
  }

  function setBaseMap(payload) {
    var name = typeof payload === "string" ? payload : payload.name;
    googleMapsApiKey = (typeof payload === "object" && payload.googleApiKey) ? payload.googleApiKey : googleMapsApiKey;
    if (!map || !BASE_MAPS[name] || name === activeBaseMap) return;
    activeBaseMap = name;
    if (baseTileLayer) map.removeLayer(baseTileLayer);
    baseTileLayer = createBaseTileLayer(activeBaseMap).addTo(map);
    baseTileLayer.bringToBack();
    scheduleMapRefresh(1800);
  }

  function scheduleMapRefresh(durationMs) {
    if (!map) return;
    mapRefreshUntil = Math.max(mapRefreshUntil, Date.now() + (durationMs || 120));
    if (mapRefreshTimer) return;
    mapRefreshTimer = setTimeout(function() {
      mapRefreshTimer = null;
      if (!map) return;
      map.invalidateSize({ animate: false, pan: false });
      if (imageOverlay && imageOverlay.refresh) imageOverlay.refresh();
    }, 80);
  }

  function createMapPanes() {
    map.createPane("geotiffPane");
    map.getPane("geotiffPane").style.zIndex = 330;
    map.getPane("geotiffPane").style.pointerEvents = "none";
    map.createPane("detectionPane");
    map.getPane("detectionPane").style.zIndex = 660;
    map.getPane("detectionPane").style.pointerEvents = "auto";
    map.createPane("scanPane");
    map.getPane("scanPane").style.zIndex = 700;
    map.getPane("scanPane").style.pointerEvents = "none";
  }

  function flushMousePosition() {
    coordFrame = null;
    if (!pendingMouseLatLng) return;
    var ll = pendingMouseLatLng;
    var now = Date.now();
    if (bridge && now - lastBridgeCoordAt > 900) {
      bridge.reportCoordinates(ll.lat, ll.lng);
      lastBridgeCoordAt = now;
    }
  }

  var GeoTiffTileOverlay = null;
  if (typeof L !== "undefined") {
  GeoTiffTileOverlay = L.Layer.extend({
    initialize: function(tileSet, bounds, options) {
      L.setOptions(this, options);
      this._tileSet = tileSet || {};
      this._bounds = bounds;
      this._tileSize = Number(this._tileSet.tileSize || this.options.tileSize || 512);
      this._baseUrl = this._tileSet.baseUrl || "";
      this._levels = (this._tileSet.levels || []).slice().sort(function(a, b) {
        return (a.width * a.height) - (b.width * b.height);
      });
      this._tiles = {};
      this._loading = {};
      this._wanted = {};
      this._wantedSignature = "";
      this._wantedSince = 0;
      this._imageCache = {};
      this._cacheOrder = [];
      this._pruneTimer = null;
      this._resetFrame = null;
      this._refreshFrame = null;
      this._moveTimer = null;
      this._fallbackLayer = null;
      this._fallbackReady = false;
    },

    onAdd: function(mapInstance) {
      this._map = mapInstance;
      this._map.on("move", this._scheduleMoveReset, this);
      this._map.on("moveend zoomend resize viewreset", this._scheduleReset, this);
      this._scheduleReset();
    },

    onRemove: function() {
      if (this._resetFrame) {
        L.Util.cancelAnimFrame(this._resetFrame);
        this._resetFrame = null;
      }
      if (this._refreshFrame) {
        L.Util.cancelAnimFrame(this._refreshFrame);
        this._refreshFrame = null;
      }
      if (this._pruneTimer) {
        clearTimeout(this._pruneTimer);
        this._pruneTimer = null;
      }
      if (this._moveTimer) {
        clearTimeout(this._moveTimer);
        this._moveTimer = null;
      }
      if (this._map) {
        this._map.off("move", this._scheduleMoveReset, this);
        this._map.off("moveend zoomend resize viewreset", this._scheduleReset, this);
      }
      if (this._fallbackLayer && this._map) {
        this._map.removeLayer(this._fallbackLayer);
      }
      this._fallbackLayer = null;
      this._removeAllTiles();
      this._map = null;
    },

    setOpacity: function(opacity) {
      this.options.opacity = opacity;
      if (this._fallbackLayer) this._fallbackLayer.setOpacity(opacity);
      Object.keys(this._tiles).forEach(function(key) {
        this._tiles[key].setOpacity(opacity);
      }, this);
      return this;
    },

    _scheduleReset: function() {
      if (!this._map) return;
      if (this._resetFrame) L.Util.cancelAnimFrame(this._resetFrame);
      this._resetFrame = L.Util.requestAnimFrame(this._reset, this);
    },

    _scheduleMoveReset: function() {
      if (!this._map || this._moveTimer) return;
      this._moveTimer = setTimeout(function() {
        this._moveTimer = null;
        this._scheduleReset();
      }.bind(this), 140);
    },

    _reset: function() {
      this._resetFrame = null;
      if (!this._map || !this._levels.length || !this._baseUrl) {
        this._removeAllTiles();
        return;
      }
      this._ensureFallbackLayer();

      var intersection = this._viewIntersection();
      if (!intersection) {
        this._removeAllTiles();
        return;
      }

      var level = this._selectLevel();
      var range = this._tileRange(level, intersection);
      if (!range) {
        this._removeAllTiles();
        return;
      }

      var wanted = {};
      for (var y = range.y0; y <= range.y1; y++) {
        for (var x = range.x0; x <= range.x1; x++) {
          var key = level.index + ":" + x + ":" + y;
          wanted[key] = true;
          if (!this._tiles[key]) this._addTile(level, x, y, key);
        }
      }
      this._wanted = wanted;
      var signature = Object.keys(wanted).sort().join("|");
      if (signature !== this._wantedSignature) {
        this._wantedSignature = signature;
        this._wantedSince = Date.now();
      }
      this._schedulePrune(wanted);
    },

    _ensureFallbackLayer: function() {
      if (this._fallbackLayer || !this._map || !this._levels.length) return;
      var fallbackLevel = this._levels[0];
      var url = this._baseUrl + fallbackLevel.index + "/0_0.png";
      this._fallbackLayer = L.imageOverlay(url, this._bounds, {
        opacity: this.options.opacity,
        interactive: false,
        crossOrigin: false,
        zIndex: (this.options.zIndex || 300) - 2,
        pane: this.options.pane,
        className: "geotiff-fallback-overlay"
      }).addTo(this._map);
      this._fallbackLayer.once("load", function() {
        this._fallbackReady = true;
      }, this);
    },

    _selectLevel: function() {
      var nw = this._map.latLngToLayerPoint(this._bounds.getNorthWest());
      var se = this._map.latLngToLayerPoint(this._bounds.getSouthEast());
      var displayWidth = Math.max(1, Math.abs(se.x - nw.x));
      var displayHeight = Math.max(1, Math.abs(se.y - nw.y));
      var dpr = Math.min(window.devicePixelRatio || 1, 2);
      var targetWidth = displayWidth * dpr * 1.15;
      var targetHeight = displayHeight * dpr * 1.15;
      for (var i = 0; i < this._levels.length; i++) {
        var level = this._levels[i];
        if (level.width >= targetWidth && level.height >= targetHeight) {
          return level;
        }
      }
      return this._levels[this._levels.length - 1];
    },

    _viewIntersection: function() {
      var view = this._map.getBounds().pad(0.85);
      var west = Math.max(this._bounds.getWest(), view.getWest());
      var east = Math.min(this._bounds.getEast(), view.getEast());
      var south = Math.max(this._bounds.getSouth(), view.getSouth());
      var north = Math.min(this._bounds.getNorth(), view.getNorth());
      if (west >= east || south >= north) return null;
      return { west: west, east: east, south: south, north: north };
    },

    _tileRange: function(level, intersection) {
      var lngSpan = this._bounds.getEast() - this._bounds.getWest();
      var latSpan = this._bounds.getNorth() - this._bounds.getSouth();
      if (lngSpan <= 0 || latSpan <= 0) return null;

      var leftPx = clamp(Math.floor((intersection.west - this._bounds.getWest()) / lngSpan * level.width), 0, level.width - 1);
      var rightPx = clamp(Math.ceil((intersection.east - this._bounds.getWest()) / lngSpan * level.width), 1, level.width);
      var topPx = clamp(Math.floor((this._bounds.getNorth() - intersection.north) / latSpan * level.height), 0, level.height - 1);
      var bottomPx = clamp(Math.ceil((this._bounds.getNorth() - intersection.south) / latSpan * level.height), 1, level.height);
      if (rightPx <= leftPx || bottomPx <= topPx) return null;

      return {
        x0: clamp(Math.floor(leftPx / this._tileSize) - 1, 0, level.cols - 1),
        x1: clamp(Math.floor((rightPx - 1) / this._tileSize) + 1, 0, level.cols - 1),
        y0: clamp(Math.floor(topPx / this._tileSize) - 1, 0, level.rows - 1),
        y1: clamp(Math.floor((bottomPx - 1) / this._tileSize) + 1, 0, level.rows - 1)
      };
    },

    _addTile: function(level, x, y, key) {
      if (this._loading[key]) return;
      var url = this._baseUrl + level.index + "/" + x + "_" + y + ".png";
      this._loading[key] = true;
      this._loadImage(url, function(ok) {
        delete this._loading[key];
        if (!ok || !this._map || !this._wanted[key] || this._tiles[key]) return;
        var layer = L.imageOverlay(url, this._tileBounds(level, x, y), {
          opacity: this.options.opacity,
          interactive: false,
          crossOrigin: false,
          zIndex: this.options.zIndex || 300,
          pane: this.options.pane,
          className: "geotiff-image-tile"
        });
        layer.once("load", function() {
          var element = layer.getElement && layer.getElement();
          if (element) element.classList.add("loaded");
        });
        this._tiles[key] = layer;
        layer.addTo(this._map);
      }, this);
    },

    _loadImage: function(url, done, context) {
      if (this._imageCache[url]) {
        done.call(context, true);
        return;
      }
      var img = new Image();
      img.onload = function() {
        this._imageCache[url] = true;
        this._cacheOrder.push(url);
        while (this._cacheOrder.length > 1400) {
          var stale = this._cacheOrder.shift();
          delete this._imageCache[stale];
        }
        done.call(context, true);
      }.bind(this);
      img.onerror = function() {
        setTimeout(function() {
          var retry = new Image();
          retry.onload = function() {
            this._imageCache[url] = true;
            this._cacheOrder.push(url);
            done.call(context, true);
          }.bind(this);
          retry.onerror = function() { done.call(context, false); };
          retry.src = url + "?retry=" + Date.now();
        }.bind(this), 180);
      }.bind(this);
      img.src = url;
    },

    _tileBounds: function(level, x, y) {
      var left = x * this._tileSize;
      var top = y * this._tileSize;
      var right = Math.min(left + this._tileSize, level.width);
      var bottom = Math.min(top + this._tileSize, level.height);
      var lngSpan = this._bounds.getEast() - this._bounds.getWest();
      var latSpan = this._bounds.getNorth() - this._bounds.getSouth();
      var west = this._bounds.getWest() + (left / level.width) * lngSpan;
      var east = this._bounds.getWest() + (right / level.width) * lngSpan;
      var north = this._bounds.getNorth() - (top / level.height) * latSpan;
      var south = this._bounds.getNorth() - (bottom / level.height) * latSpan;
      return L.latLngBounds([south, west], [north, east]);
    },

    _pruneTiles: function(wanted) {
      Object.keys(this._tiles).forEach(function(key) {
        if (wanted[key]) return;
        this._map.removeLayer(this._tiles[key]);
        delete this._tiles[key];
      }, this);
    },

    _schedulePrune: function(wanted) {
      if (this._pruneTimer) clearTimeout(this._pruneTimer);
      this._pruneTimer = setTimeout(function() {
        this._pruneTimer = null;
        if (this._hasPendingWantedTiles(wanted)) {
          this._schedulePrune(wanted);
          return;
        }
        if (this._map) this._pruneTiles(wanted);
      }.bind(this), 1200);
    },

    _hasPendingWantedTiles: function(wanted) {
      if (Date.now() - this._wantedSince > 8000) return false;
      return Object.keys(wanted).some(function(key) {
        return this._loading[key] || !this._tiles[key];
      }, this);
    },

    refresh: function() {
      this._scheduleReset();
      return this;
    },

    _removeAllTiles: function() {
      if (!this._map) {
        this._tiles = {};
        this._loading = {};
        this._wanted = {};
        this._wantedSignature = "";
        this._wantedSince = 0;
        return;
      }
      Object.keys(this._tiles).forEach(function(key) {
        this._map.removeLayer(this._tiles[key]);
      }, this);
      this._tiles = {};
      this._loading = {};
      this._wanted = {};
      this._wantedSignature = "";
      this._wantedSince = 0;
    }
  });
  }

  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  function setOverlay(payload) {
    if (!mapReady) { pendingOverlay = payload; return; }
    clearOverlay();
    currentBounds = L.latLngBounds(
      [payload.bounds.south, payload.bounds.west],
      [payload.bounds.north, payload.bounds.east]
    );
    if (GeoTiffTileOverlay && payload.tiles && payload.tiles.baseUrl && payload.tiles.levels && payload.tiles.levels.length) {
      imageOverlay = new GeoTiffTileOverlay(payload.tiles, currentBounds, {
        opacity: overlayVisible ? overlayOpacity : 0,
        zIndex: 300,
        pane: "geotiffPane"
      }).addTo(map);
    } else {
      imageOverlay = L.imageOverlay(payload.imageUrl, currentBounds, {
        opacity: overlayVisible ? overlayOpacity : 0,
        interactive: false,
        crossOrigin: false,
        zIndex: 300,
        pane: "geotiffPane",
        className: "geotiff-image-overlay"
      }).addTo(map);
    }
    extentRectangle = L.rectangle(currentBounds, {
      color: currentExtentColor,
      weight: 2,
      opacity: 0.9,
      fill: false,
      dashArray: "6 5",
      pane: "geotiffPane"
    }).addTo(map);
    labelTooltip = L.tooltip({ permanent: false, direction: "top", className: "overlay-label" })
      .setLatLng(currentBounds.getCenter()).setContent(esc(payload.fileName)).addTo(map);
    scheduleOverlayFit();
    scheduleMapRefresh(3500);
  }

  function clearOverlay() {
    clearOverlayFitTimers();
    if (!map) return;
    if (imageOverlay) { map.removeLayer(imageOverlay); imageOverlay = null; }
    if (extentRectangle) { map.removeLayer(extentRectangle); extentRectangle = null; }
    if (labelTooltip) { map.removeLayer(labelTooltip); labelTooltip = null; }
    currentBounds = null;
  }

  function setDetectionData(payload) {
    if (!mapReady) { pendingDetections = payload; return; }
    clearDetections();
    detectionVisibility = Object.assign(detectionVisibility, payload.visibility || {});
      detectionStyles = Object.assign(detectionStyles, payload.styles || {});
    if (typeof payload.opacity === "number") {
      detectionOpacity = Math.max(0, Math.min(1, payload.opacity));
    }
    allRecords = (payload.records || []).map(prepareRecord).filter(Boolean);
    scheduleDetectionRender(true);
    document.getElementById("layerLegend").classList.toggle("shown", allRecords.length > 0);
  }

  function clearDetections() {
    if (detectionGroup) detectionGroup.clearLayers();
    if (heatmapGroup) heatmapGroup.clearLayers();
    heatmapTiles = {};
    if (detectionRenderTimer) {
      clearTimeout(detectionRenderTimer);
      detectionRenderTimer = null;
    }
    detectionLayers = [];
    detectionLayerById = {};
    allRecords = [];
    document.getElementById("layerLegend").classList.remove("shown");
  }

  function prepareRecord(rec, index) {
    var lat = Number(rec.latitude);
    var lng = Number(rec.longitude);
    if (!isFinite(lat) || !isFinite(lng)) return null;
    rec._lat = lat;
    rec._lng = lng;
    rec._layerKeys = rec.layer_keys && rec.layer_keys.length ? rec.layer_keys : [rec.class_name];
    rec._renderId = String(rec.id || (rec.image_name || "record") + ":" + index);
    return rec;
  }

  function buildDetectionLayer(rec) {
    var group = L.featureGroup();
    var style = pointStyle(rec);

    // Draw the polygon mask if it exists
    if (rec.polygon_wgs84 && rec.polygon_wgs84.length >= 3 && detectionStyles.show_polygons) {
      var polyStyle = vectorStyle(rec);
      // Make the mask fill more subtle than the dot
      polyStyle.fillOpacity = Math.max(0.1, (polyStyle.fillOpacity || 0.4) * 0.4);
      polyStyle.opacity = Math.max(0.2, (polyStyle.opacity || 0.5) * 0.5);
      polyStyle.interactive = false; // Let the dot handle clicks/tooltips
      polyStyle.isPolygonMask = true;

      var polygon = L.polygon(rec.polygon_wgs84, polyStyle);
      group.addLayer(polygon);
    }

    // Draw the bounding box if it exists
    if (rec.bbox_wgs84 && rec.bbox_wgs84.length >= 2 && detectionStyles.show_bboxes) {
      var bboxStyle = vectorStyle(rec);
      bboxStyle.fillOpacity = Math.max(0.02, (bboxStyle.fillOpacity || 0.4) * 0.1);
      bboxStyle.opacity = Math.max(0.4, bboxStyle.opacity || 0.8);
      bboxStyle.weight = Math.max(1, (bboxStyle.weight || 2) - 0.5);
      bboxStyle.interactive = false;
      bboxStyle.isBboxMask = true;
      
      var rectangle = L.rectangle(rec.bbox_wgs84, bboxStyle);
      group.addLayer(rectangle);
    }

    // Draw the center dot on top
    if (detectionStyles.show_dots) {
      var marker = L.circleMarker([rec._lat, rec._lng], style);
      marker.bindPopup(buildPopup(rec), { maxWidth: 320 });
      group.addLayer(marker);
    }

    group._record = rec;
    group._layerKeys = rec._layerKeys;
    
    // Bind the popup to the group so clicking anywhere on the feature works
    group.bindPopup(buildPopup(rec), { maxWidth: 320 });
    return group;
  }

  function normalizeLatLngs(points) {
    if (!Array.isArray(points)) return [];
    return points
      .filter(function(p) { return Array.isArray(p) && p.length >= 2 && isFinite(p[0]) && isFinite(p[1]); })
      .map(function(p) { return [Number(p[0]), Number(p[1])]; });
  }

  function setDetectionLayerVisible(layerKey, visible) {
    detectionVisibility[layerKey] = visible;
    scheduleDetectionRender(true);
  }

  function setDetectionStyle(styleKey, visible) {
    detectionStyles[styleKey] = visible;
    // Clear cached layers so they are rebuilt completely with the new shapes
    if (detectionGroup) detectionGroup.clearLayers();
    if (heatmapGroup) heatmapGroup.clearLayers();
    heatmapTiles = {};
    detectionLayerById = {};
    detectionLayers = [];
    scheduleDetectionRender(true);
  }

  function setDetectionOpacity(opacity) {
    detectionOpacity = Math.max(0, Math.min(1, opacity));
    if (detectionOpacity <= 0 || detectionLayers.length === 0) {
      scheduleDetectionRender(true);
      return;
    }
    detectionLayers.forEach(function(layer) {
      if (!layer._record) return;
      if (layer.setStyle) {
        if (layer instanceof L.FeatureGroup) {
          layer.eachLayer(function(child) {
              if (child.options && child.options.isPolygonMask) {
              var st = vectorStyle(layer._record);
              st.fillOpacity = Math.max(0.1, (st.fillOpacity || 0.4) * 0.4);
                st.opacity = Math.max(0.2, (st.opacity || 0.5) * 0.5);
              child.setStyle(st);
              } else if (child.options && child.options.isBboxMask) {
                var bboxStyle = vectorStyle(layer._record);
                bboxStyle.fillOpacity = Math.max(0.02, (bboxStyle.fillOpacity || 0.4) * 0.1);
                bboxStyle.opacity = Math.max(0.4, bboxStyle.opacity || 0.8);
                bboxStyle.weight = Math.max(1, (bboxStyle.weight || 2) - 0.5);
                child.setStyle(bboxStyle);
            } else if (child instanceof L.CircleMarker) {
              child.setStyle(pointStyle(layer._record));
            }
          });
        } else {
          layer.setStyle(layer instanceof L.CircleMarker ? pointStyle(layer._record) : vectorStyle(layer._record));
        }
      }
    });
    if (heatmapGroup) {
      heatmapGroup.eachLayer(function(child) {
        if (child._record) {
          var st = vectorStyle(child._record);
          st.fillOpacity = Math.max(0.15, (st.fillOpacity || 0.4) * 1.5);
          st.opacity = 0;
          child.setStyle(st);
        }
      });
    }
  }

  function scheduleDetectionRender(immediate) {
    if (!mapReady || !map || !detectionGroup) return;
    if (detectionRenderTimer) clearTimeout(detectionRenderTimer);
    detectionRenderTimer = setTimeout(renderVisibleDetections, immediate ? 0 : 80);
  }

  function renderVisibleDetections() {
    detectionRenderTimer = null;
    if (!map || !detectionGroup || !heatmapGroup) return;
    if (!allRecords.length || detectionOpacity <= 0) {
      detectionGroup.clearLayers();
      heatmapGroup.clearLayers();
      detectionLayers = [];
      detectionLayerById = {};
      heatmapTiles = {};
      return;
    }

    var viewBounds = map.getBounds().pad(0.18);
    var visible = [];
    for (var i = 0; i < allRecords.length; i++) {
      var rec = allRecords[i];
      if (!recordIsVisible(rec)) continue;
      if (!viewBounds.contains([rec._lat, rec._lng])) continue;
      visible.push(rec);
    }

    var stride = Math.max(1, Math.ceil(visible.length / MAX_VISIBLE_POINTS));
    var wanted = {};
    var wantedHeatmapTiles = {};
    for (var j = 0; j < visible.length; j += stride) {
      var rec = visible[j];
      var id = rec._renderId;
      wanted[id] = true;

      if (detectionStyles.show_tile_heatmap && rec.heatmap_tile_wgs84 && rec.heatmap_tile_wgs84.length >= 2) {
        // Generate unique key using the WGS84 bounding coordinate string + the class type
        var tileKey = rec.heatmap_tile_wgs84[0][0].toFixed(5) + "," + rec.heatmap_tile_wgs84[0][1].toFixed(5) + "_" + rec.class_name;
        if (!wantedHeatmapTiles[tileKey]) {
          wantedHeatmapTiles[tileKey] = { bounds: rec.heatmap_tile_wgs84, rec: rec };
        }
      }
      var layer = detectionLayerById[id];
      if (layer) {
        if (layer instanceof L.FeatureGroup) {
          layer.eachLayer(function(child) {
              if (child.options && child.options.isPolygonMask) {
              var st = vectorStyle(rec);
              st.fillOpacity = Math.max(0.1, (st.fillOpacity || 0.4) * 0.4);
                st.opacity = Math.max(0.2, (st.opacity || 0.5) * 0.5);
              child.setStyle(st);
              } else if (child.options && child.options.isBboxMask) {
                var bboxStyle = vectorStyle(rec);
                bboxStyle.fillOpacity = Math.max(0.02, (bboxStyle.fillOpacity || 0.4) * 0.1);
                bboxStyle.opacity = Math.max(0.4, bboxStyle.opacity || 0.8);
                bboxStyle.weight = Math.max(1, (bboxStyle.weight || 2) - 0.5);
                child.setStyle(bboxStyle);
            } else if (child instanceof L.CircleMarker) {
              child.setStyle(pointStyle(rec));
            }
          });
        } else if (layer.setStyle) {
          layer.setStyle(pointStyle(rec));
        }
        continue;
      }
      layer = buildDetectionLayer(rec);
      detectionLayerById[id] = layer;
      detectionGroup.addLayer(layer);
    }

    Object.keys(detectionLayerById).forEach(function(id) {
      if (wanted[id]) return;
      var layer = detectionLayerById[id];
      if (layer && detectionGroup.hasLayer(layer)) {
        detectionGroup.removeLayer(layer);
      }
      delete detectionLayerById[id];
    });
    detectionLayers = Object.keys(detectionLayerById).map(function(id) {
      return detectionLayerById[id];
    });
    if (!detectionLayers.length) {
      detectionGroup.clearLayers();
    }

    // Sync Heatmap Grid Blocks
    if (detectionStyles.show_tile_heatmap) {
      Object.keys(heatmapTiles).forEach(function(key) {
        if (!wantedHeatmapTiles[key]) {
          heatmapGroup.removeLayer(heatmapTiles[key]);
          delete heatmapTiles[key];
        }
      });
      Object.keys(wantedHeatmapTiles).forEach(function(key) {
        if (!heatmapTiles[key]) {
          var tData = wantedHeatmapTiles[key];
          var style = vectorStyle(tData.rec);
          style.fillOpacity = Math.max(0.15, (style.fillOpacity || 0.4) * 1.5);
          style.opacity = 0; // Solid tile grid border looks cluttered, turn off border stroke
          style.interactive = false;
          var rect = L.rectangle(tData.bounds, style);
          rect._record = tData.rec;
          heatmapTiles[key] = rect;
          heatmapGroup.addLayer(rect);
        }
      });
    } else {
      heatmapGroup.clearLayers();
      heatmapTiles = {};
    }
  }

  function handleDetectionClick(e) {
    if (!map || !detectionLayers.length || detectionOpacity <= 0) return;
    var clickPoint = map.latLngToContainerPoint(e.latlng);
    var best = null;
    var bestDistance = Infinity;
    var threshold = Math.max(10, Math.min(16, 10 + map.getZoom() * 0.18));
    for (var i = 0; i < detectionLayers.length; i++) {
      var layer = detectionLayers[i];
      if (!layer || !layer._record) continue;
      // FeatureGroups don't have getLatLng(), fallback to the record's lat/lon
      var latlng = (layer.getLatLng) ? layer.getLatLng() : L.latLng(layer._record._lat, layer._record._lng);
      var point = map.latLngToContainerPoint(latlng);
      var distance = point.distanceTo(clickPoint);
      if (distance < bestDistance) {
        bestDistance = distance;
        best = layer._record;
      }
    }
    if (!best || bestDistance > threshold) return;
    L.popup({ maxWidth: 320 })
      .setLatLng([best._lat, best._lng])
      .setContent(buildPopup(best))
      .openOn(map);
  }

  function recordIsVisible(rec) {
    var keys = rec._layerKeys || [];
    for (var i = 0; i < keys.length; i++) {
      if (detectionVisibility[keys[i]] !== false) {
        return true;
      }
    }
    return false;
  }

  function vectorStyle(rec) {
    var st = styleForRecord(rec);
    return {
      color: st.color,
      fillColor: st.fill,
      fillOpacity: detectionOpacity <= 0 ? 0 : Math.max(0.12, 0.34 * detectionOpacity),
      opacity: detectionOpacity <= 0 ? 0 : Math.max(0.35, detectionOpacity),
      weight: st.weight,
      dashArray: st.dash,
      pane: "detectionPane",
      interactive: true
    };
  }

  function pointStyle(rec) {
    var st = styleForRecord(rec);
    return {
      color: st.color,
      fillColor: st.fill,
      fillOpacity: detectionOpacity <= 0 ? 0 : Math.max(0.45, 0.92 * detectionOpacity),
      opacity: detectionOpacity <= 0 ? 0 : Math.max(0.55, detectionOpacity),
      radius: scaledPointRadius(st.radius),
      weight: scaledPointWeight(),
      pane: "detectionPane",
      renderer: pointRenderer,
      interactive: false
    };
  }

  function scaledPointRadius(baseRadius) {
    var zoom = map ? map.getZoom() : 16;
    var zoomStops = [
      [12, 1.35], [13, 1.5], [14, 1.75], [15, 2.05],
      [16, 2.45], [17, 3.05], [18, 3.8], [19, 4.7],
      [20, 5.6], [21, 6.2]
    ];
    var radius = zoomStops[0][1];
    for (var i = 1; i < zoomStops.length; i++) {
      if (zoom <= zoomStops[i][0]) {
        var prev = zoomStops[i - 1];
        var next = zoomStops[i];
        var t = (zoom - prev[0]) / (next[0] - prev[0]);
        radius = prev[1] + (next[1] - prev[1]) * Math.max(0, Math.min(1, t));
        break;
      }
      radius = zoomStops[i][1];
    }
    var classScale = Math.max(0.9, Math.min(1.08, baseRadius / 7));
    var densityScale = allRecords.length > 1200
      ? Math.max(0.72, 1 - Math.log10(allRecords.length / 1200) * 0.16)
      : 1;
    return Math.max(1.25, Math.min(6.5, radius * classScale * densityScale));
  }

  function scaledPointWeight() {
    var zoom = map ? map.getZoom() : 16;
    if (zoom < 15) return 0.8;
    if (zoom < 17) return 1.0;
    if (zoom < 19) return 1.25;
    return 1.5;
  }

  function styleForRecord(rec) {
    var keys = rec._layerKeys || (rec.layer_keys && rec.layer_keys.length ? rec.layer_keys : [rec.class_name]);
    if (keys.indexOf("black_sigatoka") !== -1) return CLASS_STYLES.black_sigatoka;
    if (keys.indexOf("panama") !== -1) return CLASS_STYLES.panama;
    if (keys.indexOf("cut_leaf") !== -1) return CLASS_STYLES.cut_leaf;
    if (rec.health === "diseased" && CLASS_STYLES.diseased_leaf) return CLASS_STYLES.diseased_leaf;
    if (rec.health === "healthy" && CLASS_STYLES.healthy_leaf) return CLASS_STYLES.healthy_leaf;
    for (var i = 0; i < keys.length; i++) {
      if (CLASS_STYLES[keys[i]]) return CLASS_STYLES[keys[i]];
    }
    return CLASS_STYLES[rec.class_name] || { color: "#38bdf8", fill: "#38bdf8", radius: 7, weight: 2, dash: null };
  }

  function buildPopup(rec) {
    var conf = Math.round((rec.confidence || 0) * 1000) / 10;
    return (
      '<div style="font-size:12px;line-height:1.55">' +
      '<div style="font-weight:700;margin-bottom:4px">' + esc(String(rec.class_name || "").replaceAll("_", " ")) + '</div>' +
      (rec.health ? '<div><b>Health:</b> ' + esc(rec.health) + '</div>' : '') +
      '<div><b>Confidence:</b> ' + conf + '%</div>' +
      '<div><b>Image:</b> ' + esc(rec.image_name || "") + '</div>' +
      '<div><b>Lat:</b> ' + Number(rec.latitude).toFixed(7) + '</div>' +
      '<div><b>Lon:</b> ' + Number(rec.longitude).toFixed(7) + '</div>' +
      '<div><b>Duplicates:</b> ' + (rec.duplicate_count || 1) + '</div>' +
      '</div>'
    );
  }

  function setScanBox(latMin, lonMin, latMax, lonMax) {
    if (!map) return;
    if (scanBoxLayer) {
      map.removeLayer(scanBoxLayer);
      scanBoxLayer = null;
    }
    if (latMin === 0 && lonMin === 0 && latMax === 0 && lonMax === 0) return;
    scanBoxLayer = L.rectangle([[latMin, lonMin], [latMax, lonMax]], {
      color: "#f59e0b",
      weight: 3,
      opacity: 0.9,
      fillColor: "#fcd34d",
      fillOpacity: 0.18,
      dashArray: "10 5",
      pane: "scanPane",
      interactive: false
    }).addTo(map);
  }

  function setOverlayVisible(visible) {
    overlayVisible = visible;
    if (imageOverlay) imageOverlay.setOpacity(visible ? overlayOpacity : 0);
  }

  function setOverlayOpacity(opacity) {
    overlayOpacity = opacity;
    if (imageOverlay && overlayVisible) imageOverlay.setOpacity(opacity);
  }

  function clearOverlayFitTimers() {
    overlayFitTimers.forEach(function(timer) { clearTimeout(timer); });
    overlayFitTimers = [];
  }

  function scheduleOverlayFit() {
    clearOverlayFitTimers();
    [0, 120, 320, 700, 1300, 2200].forEach(function(delay) {
      overlayFitTimers.push(setTimeout(function() {
        fitToOverlay(delay > 0);
      }, delay));
    });
  }

  function fitToOverlay(animate) {
    if (map && currentBounds) {
      map.invalidateSize({ animate: false, pan: false });
      var size = map.getSize();
      if (size.x < 100 || size.y < 100) return;
      map.fitBounds(currentBounds, {
        padding: [12, 12],
        animate: animate !== false,
        duration: 0.35
      });
      scheduleMapRefresh(1800);
    }
  }

  function zoomIn() {
    if (map) map.zoomIn();
  }

  function zoomOut() {
    if (map) map.zoomOut();
  }

  function resetView() {
    if (currentBounds) fitToOverlay();
    else if (map) {
      map.setView([11.0, 122.0], 6);
      scheduleMapRefresh(1200);
    }
  }

  function applyTheme(t) {
    var r = document.documentElement.style;
    r.setProperty("--map-bg", t.mapBg);
    r.setProperty("--ctrl-bg", t.ctrlBg);
    r.setProperty("--ctrl-fg", t.ctrlFg);
    r.setProperty("--attr-bg", t.attrBg);
    r.setProperty("--attr-fg", t.attrFg);
    r.setProperty("--tooltip-bg", t.tooltipBg);
    r.setProperty("--tooltip-border", t.tooltipBorder);
    r.setProperty("--tooltip-fg", t.tooltipFg);
    r.setProperty("--extent-color", t.extentColor);
    document.body.style.background = t.mapBg;
    currentExtentColor = t.extentColor;
    if (extentRectangle) extentRectangle.setStyle({ color: t.extentColor });
    scheduleMapRefresh(1200);
  }

  function esc(v) {
    return String(v)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  initializeMap();
  </script>
</body>
</html>
